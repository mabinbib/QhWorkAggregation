<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >

    <title>工作聚合</title>

    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <!-- 登录层 -->
    <div id="loginBox">

        <div class="login-panel">

            <div class="login-title">
                工作聚合
            </div>

            <div class="login-desc">
                请输入访问密码
            </div>

            <input
                type="password"
                id="passwordInput"
                class="login-input"
                placeholder="请输入密码"
            >

            <button
                class="login-btn"
                onclick="checkPassword()"
            >
                进入系统
            </button>

        </div>

    </div>

    <!-- 主体 -->
    <div id="mainContent">

        <div class="header">

            <h1>工作聚合</h1>

           

        </div>

        <!-- 人员事务 -->
        <div class="section">

            <div 
                class="section-title"
                onclick="toggleSection(this)"
            >

                <span>人员事务</span>

                <span class="arrow">▶</span>

            </div>

            <div class="links">

                <a
                    class="card"
                    id="leaveLink"
                    target="_blank"
                >
                    <div class="card-title">
                        请假登记
                    </div>

                 
                </a>

                <a
                    class="card"
                    id="dayoffLink"
                    target="_blank"
                >
                    <div class="card-title">
                        调休登记
                    </div>

                  
                </a>

                <a
                    class="card"
                    id="overtimeLink"
                    target="_blank"
                >
                    <div class="card-title">
                        加班登记
                    </div>

                 
                </a>

                <a
                    class="card"
                    id="outingLink"
                    target="_blank"
                >
                    <div class="card-title">
                        外出登记
                    </div>

                   
                </a>

            </div>

        </div>

        <!-- 通行审批 -->
        <div class="section">

            <div
                class="section-title"
                onclick="toggleSection(this)"
            >

                <span>通行审批</span>

                <span class="arrow">▶</span>

            </div>

            <div class="links">

                <a
                    class="card"
                    id="provinceLink"
                    target="_blank"
                >
                    <div class="card-title">
                        省公司登记
                    </div>

                   
                </a>

                <a
                    class="card"
                    id="xintongLink"
                    target="_blank"
                >
                    <div class="card-title">
                        信通公司登记(海湖)
                    </div>

                  
                </a>

            </div>

        </div>

    </div>

    <script src="./app.js"></script>

</body>

</html>
